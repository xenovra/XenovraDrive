version: "3.9"

volumes:
  xenovradrive-db-volume:
    name: xenovradrive-db-volume

networks:
  xenovradrive-network:
    name: xenovradrive-network

services:
  xenovradrive:
    container_name: xenovradrive
    image: xenovradrive
    build: .
    env_file:
      - .env
    ports:
      - ${PORT}:8000
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - xenovradrive-network

  db:
    container_name: xenovradrive_db
    image: postgres:15.0-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: pg_isready --username=${DATABASE_USER} --dbname=${DATABASE_NAME}
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - xenovradrive-db-volume:/var/lib/postgresql/data
    networks:
      - xenovradrive-network
